name: Build macOS DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build with PyInstaller
        run: |
          pyinstaller cainiao_tracker.spec --noconfirm
          echo "--- 验证构建产物 ---"
          ls -la dist/
          file dist/cainiao_tracker

      - name: Assemble .app bundle
        run: |
          APP_BUNDLE="dist/CainiaoTracker.app"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          
          cp macos/Info.plist "$APP_BUNDLE/Contents/"
          cp macos/launcher.sh "$APP_BUNDLE/Contents/MacOS/"
          cp dist/cainiao_tracker "$APP_BUNDLE/Contents/Resources/"
          
          chmod +x "$APP_BUNDLE/Contents/MacOS/launcher.sh"
          chmod +x "$APP_BUNDLE/Contents/Resources/cainiao_tracker"
          
          # 复制图标（如果存在）
          if [ -f macos/icon.icns ]; then
            cp macos/icon.icns "$APP_BUNDLE/Contents/Resources/"
          fi
          
          echo "--- .app bundle 结构 ---"
          find "$APP_BUNDLE" -type f

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          DMG_STAGING="dist/dmg_staging"
          mkdir -p "$DMG_STAGING"
          cp -R "dist/CainiaoTracker.app" "$DMG_STAGING/"
          ln -sf /Applications "$DMG_STAGING/Applications"
          
          # 生成 DMG
          create-dmg \
            --volname "CainiaoTracker" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CainiaoTracker.app" 150 200 \
            --app-drop-link 450 200 \
            --no-internet-enable \
            "dist/CainiaoTracker.dmg" \
            "$DMG_STAGING/" \
          || {
            echo "create-dmg 失败，使用 hdiutil 替代..."
            hdiutil create -volname "CainiaoTracker" \
              -srcfolder "$DMG_STAGING" \
              -ov -format UDZO \
              "dist/CainiaoTracker.dmg"
          }
          
          echo "--- DMG 信息 ---"
          ls -lh dist/CainiaoTracker.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CainiaoTracker-macOS
          path: dist/CainiaoTracker.dmg

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CainiaoTracker.dmg
          generate_release_notes: true
